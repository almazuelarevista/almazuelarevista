<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Mi Web en GitHub Pages</title> <link rel="stylesheet" href="css/styles.css" />

</head>
<body>
    <header id="js-header">
        <h1 id="logo">ALMAZUELA</h1>
        <nav>
            <a class="headerLinkSelected" href="#bacon">ARTÍCULOS</a>
            <a class="headerLink" href="#sausage">SOMOS</a>
            <a class="headerLink" href="#biltong">LA REVISTA</a>
            <a class="headerLink" href="#biltong">COLABORA</a>
        </nav>
    </header>

    <div class="flag">
        <img class="flag-img" src="img/Header.png" alt="flag"/>

        <div class="social-bar"> 
            <a href="https://www.instagram.com/almazuelarevista/" target="_blank">
                <img src="img/Instagram.png" alt="Instagram" class="social-icon">
            </a>
            <a href="https://www.tiktok.com/">
                <img src="img/Tiktok.png" alt="Tiktok" class="social-icon">
            </a>
        </div>
    </div>


    <div class="selector">
        <button class="selector-btn active" data-filter="todos">Todos</button>
        <button class="selector-btn" data-filter="reportajes">Reportajes</button>
        <button class="selector-btn" data-filter="entrevistas">Entrevistas</button>
        <button class="selector-btn" data-filter="opinion">Opinión</button>
    </div>

    <div id="articles-container" class="articles-grid"></div>
    
    <script src="js/header.js"></script>
    <script src="js/data.js"></script>
    <script src="js/articles.js"></script>

</body>
